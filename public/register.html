<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Akun — 9clo</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">
  <style>
    .auth-page { min-height:calc(100vh - 200px); display:flex; align-items:center; justify-content:center; padding:60px 24px; }
    .auth-card { background:var(--bg-surface); border:1px solid var(--border); border-radius:16px; padding:48px 40px; width:100%; max-width:440px; box-shadow:var(--shadow-md); }
    .auth-title { font-size:1.6rem; font-weight:800; color:var(--white); margin-bottom:4px; }
    .auth-sub { font-size:.82rem; color:var(--text-muted); margin-bottom:32px; }
    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-size:.7rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--text-secondary); margin-bottom:7px; }
    .form-group input { width:100%; padding:13px 16px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:8px; color:var(--white); font-size:.92rem; font-family:var(--font-main); outline:none; transition:border-color .2s; }
    .form-group input:focus { border-color:var(--accent); }
    .auth-btn { width:100%; padding:14px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:.88rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; font-family:var(--font-main); transition:opacity .2s; margin-top:8px; }
    .auth-btn:hover { opacity:.88; }
    .auth-btn:disabled { opacity:.5; }
    .error-box { background:rgba(255,69,0,.1); border:1px solid rgba(255,69,0,.25); border-radius:8px; padding:11px 14px; color:#ff7550; font-size:.83rem; margin-bottom:16px; display:none; }
    .auth-footer { text-align:center; margin-top:20px; font-size:.82rem; color:var(--text-muted); }
    .auth-footer a { color:var(--accent); font-weight:600; }
    .pwd-strength { height:3px; border-radius:99px; margin-top:6px; transition:all .3s; }
  </style>
</head>
<body>
  <header class="site-header" style="position:sticky;top:0;z-index:200;background:rgba(10,10,10,.97);border-bottom:1px solid var(--border);height:64px">
    <div style="max-width:var(--max-w);margin:0 auto;padding:0 24px;height:100%;display:flex;align-items:center;justify-content:space-between">
      <a href="/index.html" style="font-size:1.5rem;font-weight:900;letter-spacing:-.04em;color:var(--white);text-decoration:none">9<span style="color:var(--accent)">clo</span></a>
      <a href="/index.html" style="font-size:.82rem;color:var(--text-secondary);text-decoration:none">← Kembali ke Toko</a>
    </div>
  </header>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-title">Buat Akun Baru</div>
      <div class="auth-sub">Sudah punya akun? <a href="/login.html">Login di sini</a></div>
      <div class="error-box" id="error-box"></div>
      <form id="reg-form">
        <div class="form-group">
          <label>Nama Lengkap *</label>
          <input type="text" id="name" placeholder="Nama kamu" required autocomplete="name">
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="email" placeholder="email@contoh.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>No. Telepon</label>
          <input type="tel" id="phone" placeholder="08123456789" autocomplete="tel">
        </div>
        <div class="form-group">
          <label>Password * (min. 8 karakter)</label>
          <input type="password" id="password" placeholder="••••••••" required minlength="8" autocomplete="new-password">
          <div class="pwd-strength" id="pwd-strength" style="background:var(--border)"></div>
        </div>
        <div class="form-group">
          <label>Konfirmasi Password *</label>
          <input type="password" id="password2" placeholder="••••••••" required autocomplete="new-password">
        </div>
        <button type="submit" class="auth-btn" id="reg-btn">Buat Akun</button>
      </form>
      <div class="auth-footer">
        Dengan mendaftar, kamu menyetujui <a href="/about.html">Syarat & Ketentuan</a> kami.
      </div>
    </div>
  </div>

  <script>
    // Password strength indicator
    document.getElementById('password').addEventListener('input', function() {
      const v = this.value; const bar = document.getElementById('pwd-strength');
      let strength = 0;
      if (v.length >= 8) strength++;
      if (/[A-Z]/.test(v)) strength++;
      if (/[0-9]/.test(v)) strength++;
      if (/[^A-Za-z0-9]/.test(v)) strength++;
      const colors = ['#333','var(--red)','var(--orange)','#aacc00','var(--green)'];
      bar.style.background = colors[strength];
      bar.style.width = (strength * 25) + '%';
    });

    document.getElementById('reg-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('reg-btn');
      const err = document.getElementById('error-box');
      const pwd  = document.getElementById('password').value;
      const pwd2 = document.getElementById('password2').value;

      if (pwd !== pwd2) {
        err.textContent = 'Password dan konfirmasi tidak cocok.';
        err.style.display = 'block'; return;
      }

      btn.disabled = true; btn.textContent = 'Membuat akun...'; err.style.display = 'none';
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST', credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password: pwd,
            phone: document.getElementById('phone').value || null
          })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/my-account.html?welcome=1';
        } else {
          err.textContent = data.error || 'Registrasi gagal.';
          err.style.display = 'block';
        }
      } catch { err.textContent = 'Koneksi error.'; err.style.display = 'block'; }
      btn.disabled = false; btn.textContent = 'Buat Akun';
    });
  </script>
</body>
</html>
