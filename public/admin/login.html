<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — 9clo</title>
  <style>
    :root {
      --accent: #ff4500;
      --bg: #080808;
      --surface: #111;
      --border: rgba(255,255,255,0.08);
      --text: #e0e0e0;
      --muted: #666;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(255,69,0,0.12) 0%, transparent 70%);
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 400px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    }
    .logo { font-size: 2rem; font-weight: 900; letter-spacing: -.05em; color: #fff; margin-bottom: 8px; }
    .logo span { color: var(--accent); }
    .subtitle { font-size: 0.75rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: 36px; }
    label { display: block; font-size: 0.72rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text);
      font-size: 0.95rem; outline: none; transition: border-color .2s; margin-bottom: 20px;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none;
      border-radius: 8px; font-size: 0.9rem; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; cursor: pointer; transition: opacity .2s, transform .15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }
    .error {
      background: rgba(255,69,0,0.12); border: 1px solid rgba(255,69,0,.3);
      border-radius: 8px; padding: 12px 16px; color: #ff6b35; font-size: 0.85rem;
      margin-bottom: 20px; display: none;
    }
    .back { display: block; text-align: center; margin-top: 20px; color: var(--muted); font-size: 0.8rem; text-decoration: none; transition: color .2s; }
    .back:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">9<span>clo</span></div>
    <div class="subtitle">Admin Panel</div>
    <div class="error" id="err-msg"></div>
    <form id="login-form">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@9clo.com" required autocomplete="email">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      <button type="submit" class="btn" id="submit-btn">Masuk ke Admin Panel</button>
    </form>
    <a href="/index.html" class="back">← Kembali ke Website</a>
  </div>

  <script>
    // Redirect if already logged in as admin
    fetch('/api/auth/me').then(r => r.json()).then(d => {
      if (d.success && d.data.role === 'admin') window.location.href = '/admin/';
    }).catch(() => {});

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const err = document.getElementById('err-msg');
      btn.disabled = true; btn.textContent = 'Masuk...';
      err.style.display = 'none';

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({
            email:    document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (data.success && data.data.role === 'admin') {
          window.location.href = '/admin/';
        } else if (data.success) {
          err.textContent = 'Akun ini bukan admin.';
          err.style.display = 'block';
        } else {
          err.textContent = data.error || 'Login gagal.';
          err.style.display = 'block';
        }
      } catch { err.textContent = 'Server error.'; err.style.display = 'block'; }
      btn.disabled = false; btn.textContent = 'Masuk ke Admin Panel';
    });
  </script>
</body>
</html>
