<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — 9clo</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/header.css">
  <style>
    .auth-page { min-height:calc(100vh - 200px); display:flex; align-items:center; justify-content:center; padding:60px 24px; }
    .auth-card { background:var(--bg-surface); border:1px solid var(--border); border-radius:16px; padding:48px 40px; width:100%; max-width:420px; box-shadow:var(--shadow-md); }
    .auth-title { font-size:1.6rem; font-weight:800; color:var(--white); margin-bottom:4px; }
    .auth-sub { font-size:0.82rem; color:var(--text-muted); margin-bottom:32px; }
    .form-group { margin-bottom:18px; }
    .form-group label { display:block; font-size:0.7rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--text-secondary); margin-bottom:7px; }
    .form-group input {
      width:100%; padding:13px 16px; background:var(--bg-elevated); border:1px solid var(--border);
      border-radius:8px; color:var(--white); font-size:0.92rem; font-family:var(--font-main); outline:none;
      transition:border-color .2s;
    }
    .form-group input:focus { border-color:var(--accent); }
    .auth-btn { width:100%; padding:14px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:0.88rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; font-family:var(--font-main); transition:opacity .2s; margin-top:8px; }
    .auth-btn:hover { opacity:.88; }
    .auth-btn:disabled { opacity:.5; cursor:not-allowed; }
    .auth-footer { text-align:center; margin-top:20px; font-size:0.82rem; color:var(--text-muted); }
    .auth-footer a { color:var(--accent); font-weight:600; }
    .error-box { background:rgba(255,69,0,.1); border:1px solid rgba(255,69,0,.25); border-radius:8px; padding:11px 14px; color:#ff7550; font-size:0.83rem; margin-bottom:18px; display:none; }
    .success-box { background:rgba(0,200,81,.1); border:1px solid rgba(0,200,81,.2); border-radius:8px; padding:11px 14px; color:#00c851; font-size:0.83rem; margin-bottom:18px; display:none; }
    .divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:var(--text-muted); font-size:.75rem; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
  </style>
</head>
<body>
  <!-- New premium header injected by JS if needed; use simple nav for auth pages -->
  <header class="site-header" style="position:sticky;top:0;z-index:200;background:rgba(10,10,10,.97);border-bottom:1px solid var(--border);height:64px">
    <div style="max-width:var(--max-w);margin:0 auto;padding:0 24px;height:100%;display:flex;align-items:center;justify-content:space-between">
      <a href="/index.html" style="font-size:1.5rem;font-weight:900;letter-spacing:-.04em;color:var(--white);text-decoration:none">9<span style="color:var(--accent)">clo</span></a>
      <a href="/index.html" style="font-size:.82rem;color:var(--text-secondary);text-decoration:none">← Kembali ke Toko</a>
    </div>
  </header>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-title">Masuk ke Akun</div>
      <div class="auth-sub">Belum punya akun? <a href="/register.html">Daftar di sini</a></div>

      <div class="error-box" id="error-box"></div>
      <div class="success-box" id="success-box"></div>

      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="email@contoh.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div style="text-align:right;margin-bottom:4px"><a href="/forgot-password.html" style="font-size:.78rem;color:var(--text-muted)">Lupa password?</a></div>
        <button type="submit" class="auth-btn" id="login-btn">Login</button>
      </form>

      <div class="divider">atau</div>
      <div class="auth-footer">Lanjut belanja tanpa akun → <a href="/shop.html">Lihat Produk</a></div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    fetch('/api/auth/me', { credentials: 'same-origin' }).then(r=>r.json()).then(d => {
      if (d.success) {
        if (d.data.role === 'admin') window.location.href = '/admin/';
        else {
          const returnTo = new URLSearchParams(location.search).get('return') || '/my-account.html';
          window.location.href = returnTo;
        }
      }
    }).catch(()=>{});

    // Show verified message
    if (new URLSearchParams(location.search).get('verified') === '1') {
      const s = document.getElementById('success-box');
      s.textContent = '✅ Email berhasil diverifikasi! Silakan login.';
      s.style.display = 'block';
    }

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('error-box');
      btn.disabled = true; btn.textContent = 'Masuk...'; err.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST', credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
        });
        const data = await res.json();
        if (data.success) {
          if (data.data.role === 'admin') window.location.href = '/admin/';
          else {
            const returnTo = new URLSearchParams(location.search).get('return') || '/my-account.html';
            window.location.href = returnTo;
          }
        } else {
          err.textContent = data.error || 'Login gagal.';
          err.style.display = 'block';
        }
      } catch { err.textContent = 'Koneksi error. Coba lagi.'; err.style.display = 'block'; }
      btn.disabled = false; btn.textContent = 'Login';
    });
  </script>
</body>
</html>
