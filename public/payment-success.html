<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pembayaran Berhasil — 9clo</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-main); }
    .result-card { text-align: center; max-width: 480px; padding: 0 24px; }
    .result-icon { font-size: 4rem; margin-bottom: 20px; animation: pop .5s cubic-bezier(.34,1.56,.64,1); }
    @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .result-title { font-size: 2rem; font-weight: 900; color: var(--white); margin-bottom: 8px; }
    .result-sub { color: var(--text-muted); margin-bottom: 8px; font-size: .95rem; line-height: 1.6; }
    .order-info { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin: 24px 0; text-align: left; }
    .order-info p { display: flex; justify-content: space-between; font-size: .88rem; margin-bottom: 8px; }
    .order-info p:last-child { margin-bottom: 0; border-top: 1px solid var(--border); padding-top: 10px; font-weight: 700; }
    .info-label { color: var(--text-muted); }
    .info-val { color: var(--white); font-family: monospace; }
    .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
    .btn-success { padding: 13px 28px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: .88rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; cursor: pointer; text-decoration: none; }
    .btn-outline { padding: 13px 28px; background: none; color: var(--text-secondary); border: 1px solid var(--border); border-radius: 8px; font-size: .88rem; font-weight: 600; cursor: pointer; text-decoration: none; }
    .btn-outline:hover { border-color: var(--accent); color: var(--white); }
    .green { color: #00c851; }
  </style>
</head>
<body>
  <div class="result-card">
    <div class="result-icon">✅</div>
    <div class="result-title" style="color:#00c851;">Pembayaran Berhasil!</div>
    <div class="result-sub">Terima kasih telah berbelanja di 9clo. Pesananmu sedang kami proses.</div>

    <div class="order-info" id="order-info">
      <p><span class="info-label">Order Number</span><span class="info-val" id="order-num">Loading...</span></p>
      <p><span class="info-label">Status</span><span class="info-val green">✓ Terbayar</span></p>
    </div>

    <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:20px">
      📧 Email konfirmasi sedang dikirim ke alamat emailmu.
    </p>

    <div class="btn-group">
      <a href="/my-account.html" class="btn-success">📦 Lihat Pesanan</a>
      <a href="/shop.html" class="btn-outline">Lanjut Belanja →</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const orderNum = params.get('order_id') || params.get('order_number') || '-';
    document.getElementById('order-num').textContent = orderNum;
    if (orderNum !== '-') {
      fetch(`/api/payment/status/${orderNum}`).then(r => r.json()).then(d => {
        if (d.success) {
          document.getElementById('order-num').textContent = d.data.order_number;
        }
      }).catch(() => {});
    }
  </script>
</body>
</html>
