name: Deploy to Railway

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Health check (optional smoke test)
        run: node -e "require('./database/db'); console.log('DB OK');"

      - name: Deploy via Railway
        uses: railway-app/deploy-action@v1
        with:
          service: web
          railway-token: ${{ secrets.RAILWAY_TOKEN }}
